<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadGen — Lead Generation</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LeadGen">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-inner">
            <span class="nav-brand">LeadGen</span>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/lead-gen" class="active">Lead Generation</a>
                <a href="/tracker">Tracker</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Lead Generation Tool</h1>

        <div class="search-form">
            <div class="form-row">
                <input type="text" id="keyword" placeholder="Profession (e.g. Plumber)" />
            </div>
            <div class="form-row form-row-location">
                <input type="text" id="location" placeholder="Suburb or area (e.g. Penrith)" />
                <input type="text" id="countryCode" placeholder="au" value="au" maxlength="2" title="ISO 2-letter country code (e.g. au, us, gb)" />
            </div>
            <div class="form-row">
                <select id="radius">
                    <option value="1000">Radius: 1 km</option>
                    <option value="2000">Radius: 2 km</option>
                    <option value="5000" selected>Radius: 5 km</option>
                    <option value="10000">Radius: 10 km</option>
                    <option value="20000">Radius: 20 km</option>
                </select>
                <select id="gridSize">
                    <option value="1">Grid: 1 point</option>
                    <option value="4">Grid: 2x2 (4 points)</option>
                    <option value="9" selected>Grid: 3x3 (9 points)</option>
                    <option value="16">Grid: 4x4 (16 points)</option>
                </select>
            </div>
            <div class="form-row">
                <button id="searchBtn" class="search-btn-full">Search</button>
            </div>
            <div id="coordsDisplay" class="coords-display" style="display:none;"></div>
        </div>

        <div id="loading" class="loading" style="display:none;">Running grid search... this may take 30–60 seconds.</div>

        <div id="results-section" style="display:none;">

            <!-- Stats bar -->
            <div class="stats-bar">
                <div class="stat"><span id="statRaw">0</span><label>Raw Results</label></div>
                <div class="stat"><span id="statUnique">0</span><label>Unique</label></div>
                <div class="stat"><span id="statDupes">0</span><label>Dupes Removed</label></div>
                <div class="stat highlight"><span id="statLeads">0</span><label>Leads (No Website)</label></div>
            </div>

            <!-- Save status -->
            <div id="saveStatus" class="save-status" style="display:none;"></div>

            <!-- No Website Leads -->
            <div class="section-header">
                <h2>Leads — No Website <span class="badge badge-green" id="noWebsiteCount">0</span></h2>
            </div>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Business Name</th>
                        <th>Address</th>
                        <th>Place ID</th>
                    </tr>
                </thead>
                <tbody id="noWebsiteBody"></tbody>
            </table>

            <button id="exportBtn" class="export-button">Export Leads as CSV</button>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <!-- Spinner overlay — shown during search, blocks all interaction -->
    <div id="spinnerOverlay" class="spinner-overlay" style="display:none;">
        <div class="spinner-box">
            <div class="spinner"></div>
            <p id="spinnerMsg">Running grid search…</p>
        </div>
    </div>

    <!-- Duplicate search warning modal -->
    <div id="dupModalOverlay" class="modal-overlay" style="display:none;">
        <div class="modal">
            <h2>⚠️ Search Already Run</h2>
            <p id="dupModalMsg"></p>
            <div class="modal-actions">
                <button id="dupProceedBtn" class="btn-proceed">Run Again</button>
                <button id="dupCancelBtn" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
